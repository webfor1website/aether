name: CI with Aether Trust Check

on:
  workflow_dispatch:

jobs:
  aether-trust-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Aether trust check
      uses: webfor1website/aether/.github/workflows/aether-check.yml@main
      with:
        source-dir: './src'
        min-trust: '0.7'
