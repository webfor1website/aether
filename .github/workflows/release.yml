name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Build release binary
      run: cargo build --release --bin aether-cli

    - name: Prepare binary
      run: |
        cp target/release/aether-cli aether-cli-linux-x64

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          aether-cli-linux-x64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
