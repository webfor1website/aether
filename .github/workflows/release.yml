name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary-name: aether-cli-linux-x64
          - os: windows-latest
            binary-name: aether-cli-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Build release binary
      run: cargo build --release --bin aether-cli

    - name: Prepare binary
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          cp target/release/aether-cli.exe ${{ matrix.binary-name }}
        else
          cp target/release/aether-cli ${{ matrix.binary-name }}
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ matrix.binary-name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
