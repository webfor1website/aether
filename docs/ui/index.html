<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether - AI Code Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #79c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .status.online {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status.offline {
            background: rgba(249, 115, 22, 0.1);
            color: #f97316;
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .upload-area {
            border: 2px dashed #30363d;
            border-radius: 0.75rem;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #161b22;
            margin-bottom: 2rem;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.05);
        }

        .upload-area h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: #f0f6fc;
        }

        .upload-area p {
            color: #8b949e;
            font-size: 0.875rem;
        }

        .file-input {
            display: none;
        }

        .code-input {
            width: 100%;
            min-height: 200px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 0.5rem;
            padding: 1rem;
            color: #c9d1d9;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.875rem;
            resize: vertical;
            margin-bottom: 1rem;
        }

        .code-input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }

        .btn-primary {
            background: #58a6ff;
            color: white;
        }

        .btn-primary:hover {
            background: #79c0ff;
        }

        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }

        .btn-secondary:hover {
            background: #30363d;
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .trust-score {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .trust-score h3 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: #f0f6fc;
        }

        .score-display {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .score-bar {
            flex: 1;
            height: 8px;
            background: #21262d;
            border-radius: 4px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #f97316, #ef4444);
            transition: width 0.5s ease;
        }

        .verdict {
            font-size: 1.125rem;
            font-weight: 500;
            color: #f0f6fc;
        }

        .ai-probabilities {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .ai-probabilities h3 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: #f0f6fc;
        }

        .probability-bar {
            margin-bottom: 1rem;
        }

        .probability-bar:last-child {
            margin-bottom: 0;
        }

        .probability-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
        }

        .probability-name {
            font-weight: 500;
            color: #f0f6fc;
        }

        .probability-value {
            color: #8b949e;
        }

        .probability-track {
            height: 6px;
            background: #21262d;
            border-radius: 3px;
            overflow: hidden;
        }

        .probability-fill {
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 3px;
        }

        .probability-fill.claude { background: #58a6ff; }
        .probability-fill.cursor { background: #79c0ff; }
        .probability-fill.grok { background: #f97316; }
        .probability-fill.user { background: #22c55e; }
        .probability-fill.ai { background: #ef4444; }

        .functions {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .functions h3 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: #f0f6fc;
        }

        .function-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: #0d1117;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .function-item:last-child {
            margin-bottom: 0;
        }

        .function-name {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.875rem;
            color: #8b949e;
        }

        .function-trust {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-correct {
            background: #22c55e;
            color: white;
        }

        .btn-correct:hover {
            background: #34d399;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 0.75rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f0f6fc;
        }

        .modal-close {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #f0f6fc;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #f0f6fc;
        }

        .form-select {
            width: 100%;
            padding: 0.75rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 0.5rem;
            color: #c9d1d9;
            font-size: 0.875rem;
        }

        .form-select:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .confidence-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .confidence-btn {
            padding: 0.75rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 0.5rem;
            color: #c9d1d9;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }

        .confidence-btn:hover {
            border-color: #58a6ff;
        }

        .confidence-btn.active {
            background: #58a6ff;
            border-color: #58a6ff;
        }

        .form-textarea {
            width: 100%;
            min-height: 100px;
            padding: 0.75rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 0.5rem;
            color: #c9d1d9;
            font-size: 0.875rem;
            resize: vertical;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .learning-panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 0.75rem;
            padding: 1.5rem;
        }

        .learning-panel h3 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: #f0f6fc;
        }

        .learning-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-item {
            background: #0d1117;
            padding: 1rem;
            border-radius: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #58a6ff;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #8b949e;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #161b22;
            border: 2px solid #22c55e;
            border-radius: 0.75rem;
            padding: 2rem;
            text-align: center;
            z-index: 2000;
            min-width: 300px;
        }

        .popup h3 {
            color: #22c55e;
            margin-bottom: 1rem;
            font-size: 1.25rem;
        }

        .popup p {
            color: #c9d1d9;
            margin-bottom: 1.5rem;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1999;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Aether</h1>
            <div class="status offline" id="status">
                <div class="status-indicator"></div>
                <span id="status-text">Offline Mode</span>
            </div>
            <p style="color: #8b949e; font-size: 0.875rem;">AI Code Analysis & Provenance Detection</p>
        </header>

        <main>
            <div class="upload-area" id="upload-area">
                <h3>Drop files here or click to upload</h3>
                <p>Supported file types: .ae, .aeth, .rs, .py, .ts</p>
                <input type="file" class="file-input" id="file-input" accept=".ae,.aeth,.rs,.py,.ts">
            </div>

            <textarea class="code-input" id="code-input" placeholder="Or paste your code here..."></textarea>

            <div class="button-group">
                <button class="btn btn-primary" id="analyze-btn">Analyze</button>
                <button class="btn btn-secondary" id="clear-btn">Clear</button>
            </div>

            <div class="results" id="results">
                <div class="trust-score">
                    <h3>Trust Score</h3>
                    <div class="score-display">
                        <div class="score-value" id="trust-score-value">0.00</div>
                        <div class="score-bar">
                            <div class="score-fill" id="trust-score-fill"></div>
                        </div>
                    </div>
                    <div class="verdict" id="verdict">Analyzing...</div>
                </div>

                <div class="ai-probabilities">
                    <h3>AI Source Probabilities</h3>
                    <div id="probability-bars"></div>
                </div>

                <div class="functions">
                    <h3>Function Analysis</h3>
                    <div id="functions-list"></div>
                </div>

                <div class="actions">
                    <button class="btn btn-correct" id="correct-btn">Correct AI Source</button>
                </div>
            </div>

            <div class="learning-panel">
                <h3>Learning Panel</h3>
                <div class="learning-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="correction-count">0</div>
                        <div class="stat-label">Corrections Made</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="top-pattern">-</div>
                        <div class="stat-label">Top Pattern</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Correction Modal -->
    <div class="modal" id="correction-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Correct AI Source</h2>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Correct AI Source</label>
                    <select class="form-select" id="correct-source">
                        <option value="">Select the correct AI source...</option>
                        <option value="claude">Claude (Anthropic)</option>
                        <option value="cursor">Cursor</option>
                        <option value="grok">Grok (X.AI)</option>
                        <option value="user">Human (User)</option>
                        <option value="ai">Other AI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Confidence Level</label>
                    <div class="confidence-buttons">
                        <button class="confidence-btn" data-confidence="25">25%</button>
                        <button class="confidence-btn" data-confidence="50">50%</button>
                        <button class="confidence-btn" data-confidence="75">75%</button>
                        <button class="confidence-btn active" data-confidence="100">100%</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Notes (Optional)</label>
                    <textarea class="form-textarea" id="correction-notes" placeholder="Any additional context..."></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="submit-btn">Submit Correction</button>
            </div>
        </div>
    </div>

    <script>
        // State management
        let serverOnline = false;
        let currentCode = '';
        let currentAnalysis = null;
        let selectedConfidence = 100;

        // DOM elements
        const statusEl = document.getElementById('status');
        const statusTextEl = document.getElementById('status-text');
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const codeInput = document.getElementById('code-input');
        const analyzeBtn = document.getElementById('analyze-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultsEl = document.getElementById('results');
        const correctionModal = document.getElementById('correction-modal');
        const correctBtn = document.getElementById('correct-btn');

        // Server communication
        async function checkServerHealth() {
            try {
                const response = await fetch('http://localhost:3000/health');
                if (response.ok) {
                    serverOnline = true;
                    statusEl.className = 'status online';
                    statusTextEl.textContent = 'Connected to Aether Server';
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                serverOnline = false;
                statusEl.className = 'status offline';
                statusTextEl.textContent = 'Offline Mode';
            }
        }

        async function analyzeCode(code) {
            if (serverOnline) {
                try {
                    const response = await fetch('http://localhost:3000/analyze', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ code }),
                    });
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (error) {
                    console.log('Server analysis failed, falling back to offline mode');
                }
            }
            
            // Offline fallback - basic analysis
            return performOfflineAnalysis(code);
        }

        function performOfflineAnalysis(code) {
            const lines = code.split('\n');
            const functions = [];
            
            // Basic function detection
            lines.forEach((line, index) => {
                const trimmed = line.trim();
                if (trimmed.includes('function ') || trimmed.includes('def ') || trimmed.includes('fn ')) {
                    const name = trimmed.match(/(?:function|def|fn)\s+(\w+)/);
                    if (name) {
                        functions.push({
                            name: name[1],
                            line: index + 1,
                            trust_score: 0.5 + Math.random() * 0.3,
                            source: 'unknown'
                        });
                    }
                }
            });

            return {
                trust_score: 0.5 + Math.random() * 0.3,
                verdict: 'Basic offline analysis',
                functions: functions,
                ai_probabilities: {
                    claude: 0.2,
                    cursor: 0.2,
                    grok: 0.2,
                    user: 0.2,
                    ai: 0.2
                }
            };
        }

        function displayResults(analysis) {
            currentAnalysis = analysis;
            resultsEl.classList.add('show');

            // Trust score
            const trustScore = analysis.trust_score || 0;
            document.getElementById('trust-score-value').textContent = trustScore.toFixed(2);
            document.getElementById('trust-score-fill').style.width = `${trustScore * 100}%`;
            document.getElementById('verdict').textContent = analysis.verdict || 'Analysis complete';

            // AI probabilities
            const probabilities = analysis.ai_probabilities || {};
            const probabilityBars = document.getElementById('probability-bars');
            probabilityBars.innerHTML = '';

            const sources = ['claude', 'cursor', 'grok', 'user', 'ai'];
            const sourceNames = {
                claude: 'Claude',
                cursor: 'Cursor',
                grok: 'Grok',
                user: 'Human',
                ai: 'Other AI'
            };

            sources.forEach(source => {
                const probability = probabilities[source] || 0;
                const bar = document.createElement('div');
                bar.className = 'probability-bar';
                bar.innerHTML = `
                    <div class="probability-label">
                        <span class="probability-name">${sourceNames[source]}</span>
                        <span class="probability-value">${(probability * 100).toFixed(1)}%</span>
                    </div>
                    <div class="probability-track">
                        <div class="probability-fill ${source}" style="width: ${probability * 100}%"></div>
                    </div>
                `;
                probabilityBars.appendChild(bar);
            });

            // Functions
            const functionsList = document.getElementById('functions-list');
            functionsList.innerHTML = '';

            (analysis.functions || []).forEach(func => {
                const item = document.createElement('div');
                item.className = 'function-item';
                item.innerHTML = `
                    <span class="function-name">${func.name}</span>
                    <span class="function-trust">${(func.trust_score * 100).toFixed(1)}%</span>
                `;
                functionsList.appendChild(item);
            });

            updateLearningPanel();
        }

        function showCorrectionModal() {
            correctionModal.classList.add('show');
        }

        function hideCorrectionModal() {
            correctionModal.classList.remove('show');
        }

        function submitCorrection() {
            const source = document.getElementById('correct-source').value;
            const notes = document.getElementById('correction-notes').value;

            if (!source) {
                alert('Please select an AI source');
                return;
            }

            // Save to LocalStorage
            const corrections = JSON.parse(localStorage.getItem('aether-corrections') || '[]');
            corrections.push({
                code: currentCode,
                detected_source: currentAnalysis?.ai_probabilities,
                correct_source: source,
                confidence: selectedConfidence,
                notes: notes,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('aether-corrections', JSON.stringify(corrections));

            hideCorrectionModal();
            showPopup('Feedback logged — detection improving');
            updateLearningPanel();
        }

        function showPopup(message) {
            const overlay = document.createElement('div');
            overlay.className = 'popup-overlay';
            
            const popup = document.createElement('div');
            popup.className = 'popup';
            popup.innerHTML = `
                <h3>✅ Success</h3>
                <p>${message}</p>
            `;

            document.body.appendChild(overlay);
            document.body.appendChild(popup);

            setTimeout(() => {
                overlay.remove();
                popup.remove();
            }, 3000);
        }

        function updateLearningPanel() {
            const corrections = JSON.parse(localStorage.getItem('aether-corrections') || '[]');
            document.getElementById('correction-count').textContent = corrections.length;

            if (corrections.length > 0) {
                const sources = {};
                corrections.forEach(c => {
                    sources[c.correct_source] = (sources[c.correct_source] || 0) + 1;
                });
                const topSource = Object.entries(sources).sort((a, b) => b[1] - a[1])[0];
                const sourceNames = {
                    claude: 'Claude',
                    cursor: 'Cursor',
                    grok: 'Grok',
                    user: 'Human',
                    ai: 'Other AI'
                };
                document.getElementById('top-pattern').textContent = sourceNames[topSource[0]] || topSource[0];
            } else {
                document.getElementById('top-pattern').textContent = '-';
            }
        }

        // Event listeners
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    codeInput.value = e.target.result;
                    currentCode = e.target.result;
                };
                reader.readAsText(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    codeInput.value = e.target.result;
                    currentCode = e.target.result;
                };
                reader.readAsText(file);
            }
        });

        codeInput.addEventListener('input', (e) => {
            currentCode = e.target.value;
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!currentCode.trim()) {
                alert('Please enter or upload some code');
                return;
            }

            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Analyzing...';

            try {
                const analysis = await analyzeCode(currentCode);
                displayResults(analysis);
            } catch (error) {
                console.error('Analysis failed:', error);
                alert('Analysis failed. Please try again.');
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = 'Analyze';
            }
        });

        clearBtn.addEventListener('click', () => {
            codeInput.value = '';
            currentCode = '';
            resultsEl.classList.remove('show');
        });

        correctBtn.addEventListener('click', showCorrectionModal);

        document.getElementById('modal-close').addEventListener('click', hideCorrectionModal);
        document.getElementById('cancel-btn').addEventListener('click', hideCorrectionModal);
        document.getElementById('submit-btn').addEventListener('click', submitCorrection);

        // Confidence buttons
        document.querySelectorAll('.confidence-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.confidence-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedConfidence = parseInt(btn.dataset.confidence);
            });
        });

        // Initialize
        checkServerHealth();
        updateLearningPanel();
        
        // Check server health periodically
        setInterval(checkServerHealth, 10000);
    </script>
</body>
</html>
