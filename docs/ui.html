<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether UI - Trust Analysis for AI-Generated Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
            font-size: 16px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            padding: 20px 0;
            border-bottom: 1px solid #21262d;
            background-color: #161b22;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #58a6ff;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            background-color: #161b22;
            border: 1px solid #30363d;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #f85149;
        }

        .status-indicator.online {
            background-color: #3fb950;
        }

        main {
            padding: 40px 0;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
            margin-bottom: 40px;
        }

        .editor-panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }

        .editor-header {
            padding: 16px;
            background-color: #21262d;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-tabs {
            display: flex;
            gap: 8px;
        }

        .tab {
            padding: 6px 12px;
            border-radius: 6px;
            background-color: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 14px;
        }

        .tab.active {
            background-color: #1f6feb;
            color: white;
        }

        .editor-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #21262d;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #30363d;
        }

        .btn.primary {
            background-color: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }

        .btn.primary:hover {
            background-color: #2c7fdb;
        }

        .code-editor {
            padding: 16px;
            min-height: 400px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            background-color: #0d1117;
            border: none;
            outline: none;
            resize: vertical;
            color: #c9d1d9;
            width: 100%;
        }

        .analysis-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .trust-score-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .trust-score {
            font-size: 3rem;
            font-weight: 600;
            margin: 16px 0;
        }

        .trust-score.high {
            color: #3fb950;
        }

        .trust-score.medium {
            color: #d29922;
        }

        .trust-score.low {
            color: #f85149;
        }

        .trust-label {
            font-size: 0.875rem;
            color: #8b949e;
            margin-bottom: 8px;
        }

        .trust-breakdown {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #30363d;
        }

        .trust-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .correction-form {
            max-width: 500px;
        }

        .current-detection {
            padding: 1rem;
            background-color: var(--light-bg);
            border-radius: var(--radius);
            margin-bottom: 1rem;
        }

        .detection-result {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .source-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            color: white;
        }

        .source-user { background-color: var(--success-color); }
        .source-claude { background-color: #f85149; }
        .source-cursor { background-color: var(--primary-color); }
        .source-grok { background-color: var(--secondary-color); }
        .source-ai { background-color: var(--warning-color); }

        .correction-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .learning-stats {
            padding: 1rem;
            background-color: var(--light-bg);
            border-radius: var(--radius);
            margin-top: 1rem;
            font-size: 0.875rem;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--light-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-primary);
        }

        .trust-bar {
            height: 4px;
            background-color: #30363d;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }

        .trust-fill {
            height: 100%;
            background-color: #1f6feb;
            transition: width 0.3s ease;
        }

        .provenance-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }

        .provenance-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .provenance-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background-color: #0d1117;
            border-radius: 6px;
        }

        .provenance-source {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .source.user {
            background-color: #3fb950;
            color: white;
        }

        .source.claude {
            background-color: #1f6feb;
            color: white;
        }

        .source.cursor {
            background-color: #79c0ff;
            color: #0d1117;
        }

        .source.grok {
            background-color: #d29922;
            color: white;
        }

        .source.ai {
            background-color: #8b949e;
            color: white;
        }

        .provenance-confidence {
            margin-left: auto;
            font-size: 0.875rem;
            color: #8b949e;
        }

        .policy-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }

        .policy-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.875rem;
            color: #8b949e;
        }

        .form-input {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            color: #c9d1d9;
            font-size: 14px;
        }

        .form-select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            color: #c9d1d9;
            font-size: 14px;
        }

        .results-section {
            margin-top: 40px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .result-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }

        .file-upload {
            border: 2px dashed #30363d;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .file-upload:hover {
            border-color: #1f6feb;
        }

        .file-upload.dragover {
            border-color: #1f6feb;
            background-color: #0d4f8c;
        }

        .error-message {
            background-color: #2d1a1a;
            border: 1px solid #f85149;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            color: #ff7b72;
        }

        .success-message {
            background-color: #1a2d1a;
            border: 1px solid #3fb950;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            color: #7ee83f;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8b949e;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #30363d;
            border-top: 2px solid #1f6feb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 1fr;
            }
            
            .analysis-panel {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 16px;
            }
            
            .workspace {
                gap: 16px;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">Aether UI</div>
                <div class="server-status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="file-upload" id="fileUpload">
                <div>
                    <p>Drop files here or click to upload</p>
                    <p>Supported file types: .ae, .aeth, .rs, .py, .ts, .js, .css, .html, .json, .md</p>
                </div>
            </div>

            <div class="workspace">
                <div class="editor-panel">
                    <div class="editor-header">
                        <div class="editor-tabs">
                            <button class="tab active" data-tab="code">Code</button>
                            <button class="tab" data-tab="analysis">Analysis</button>
                        </div>
                        <div class="editor-actions">
                            <button class="btn" id="clearBtn">Clear</button>
                            <button class="btn primary" id="analyzeBtn">Analyze</button>
                        </div>
                    </div>
                    <textarea class="code-editor" id="codeEditor" placeholder="// Enter your Aether code here or upload a file...

@prov(source: \"user\", confidence: 1.0)
fn main() -> Int {
  42
}"></textarea>
                </div>

                <div class="analysis-panel">
                    <div class="trust-score-card">
                        <div class="trust-label">Trust Score</div>
                        <div class="trust-score high" id="trustScore">1.00</div>
                        <div class="trust-label">High Trust</div>
                        <div class="trust-breakdown">
                            <div class="trust-item">
                                <span>User Code</span>
                                <span>100%</span>
                            </div>
                            <div class="trust-bar">
                                <div class="trust-fill" style="width: 100%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="provenance-card">
                        <h3>Provenance</h3>
                        <div class="provenance-list" id="provenanceList">
                            <div class="provenance-item">
                                <div class="provenance-source source user">user</div>
                                <span>main() function</span>
                                <span class="provenance-confidence">100% confidence</span>
                            </div>
                        </div>
                    </div>

                    <div class="policy-card">
                        <h3>Policy
        <!-- AI Source Correction Modal -->
        <div id="correction-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Correct AI Source</h2>
                    <button id="close-correction" class="btn btn-ghost">✕</button>
                </div>
                <div class="modal-body">
                    <div class="correction-form">
                        <div class="form-group">
                            <label class="form-label">Current Detection:</label>
                            <div id="current-detection" class="current-detection"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Correct AI Source:</label>
                            <select id="correct-source" class="form-select">
                                <option value="">Select the correct AI source...</option>
                                <option value="user">Human (User)</option>
                                <option value="claude">Claude (Anthropic)</option>
                                <option value="cursor">Cursor</option>
                                <option value="grok">Grok (X.AI)</option>
                                <option value="ai">Generic AI</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confidence (How certain are you?):</label>
                            <select id="correction-confidence" class="form-select">
                                <option value="100">100% - Absolutely certain</option>
                                <option value="90">90% - Very confident</option>
                                <option value="75">75% - Confident</option>
                                <option value="50">50% - Somewhat confident</option>
                                <option value="25">25% - Not very confident</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Notes (Optional):</label>
                            <textarea id="correction-notes" class="textarea" placeholder="Any additional context about why this correction is needed..."></textarea>
                        </div>
                        <div class="correction-actions">
                            <button id="submit-correction" class="btn btn-primary">Submit Correction</button>
                            <button id="cancel-correction" class="btn btn-secondary">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
                            <div class="form-group">
                                <label class="form-label">Minimum Trust</label>
                                <input type="range" class="form-input" id="minTrust" min="0" max="1" step="0.1" value="0.7">
                                <span id="minTrustValue">0.7</span>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Enforcement Mode</label>
                                <select class="form-select" id="enforcementMode">
                                    <option value="report">Report</option>
                                    <option value="enforce">Enforce</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Scoring</label>
                                <select class="form-select" id="scoringMode">
                                    <option value="weighted">Weighted</option>
                                    <option value="flat">Flat</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="results-section">
                <div class="card-header">
                    <h2>Analysis Summary</h2>
                    <button id="correct-source-btn" class="btn btn-ghost">🔧 Correct AI Source</button>
                </div>
                <div class="results-grid" id="resultsGrid">
                    <!-- Results will be populated here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Configuration
        const API_BASE = window.location.protocol === 'file:'
            ? null  // Offline mode when opened as file
            : (window.location.origin === 'http://localhost:3000' 
                ? 'http://localhost:8080' 
                : `${window.location.origin}/api`);

        // State
        let currentCode = '';
        let analysisResults = null;
        let serverOnline = false;

        // DOM Elements
        const codeEditor = document.getElementById('codeEditor');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const fileUpload = document.getElementById('fileUpload');
        const trustScore = document.getElementById('trustScore');
        const provenanceList = document.getElementById('provenanceList');
        const resultsGrid = document.getElementById('resultsGrid');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const minTrust = document.getElementById('minTrust');
        const minTrustValue = document.getElementById('minTrustValue');
        const enforcementMode = document.getElementById('enforcementMode');
        const scoringMode = document.getElementById('scoringMode');

        // Initialize the app
        let learningSystem;
        document.addEventListener('DOMContentLoaded', () => {
            learningSystem = new AILearningSystem();
            setupCorrectionUI();
            setupEventListeners();
            checkServerHealth();
            loadSampleCode();
        });

        function setupCorrectionUI() {
            const correctBtn = document.getElementById('correct-source-btn');
            const correctionModal = document.getElementById('correction-modal');
            const closeBtn = document.getElementById('close-correction');
            const submitBtn = document.getElementById('submit-correction');
            const cancelBtn = document.getElementById('cancel-correction');

            correctBtn.addEventListener('click', () => {
                openCorrectionModal();
            });

            closeBtn.addEventListener('click', () => {
                closeCorrectionModal();
            });

            cancelBtn.addEventListener('click', () => {
                closeCorrectionModal();
            });

            submitBtn.addEventListener('click', () => {
                submitCorrection();
            });

            // Close modal when clicking outside
            correctionModal.addEventListener('click', (e) => {
                if (e.target === correctionModal) {
                    closeCorrectionModal();
                }
            });
        }

        function openCorrectionModal() {
            const modal = document.getElementById('correction-modal');
            const currentDetection = document.getElementById('current-detection');
            
            if (analysisResults && analysisResults.provenance && analysisResults.provenance.length > 0) {
                const topResult = analysisResults.provenance[0];
                currentDetection.innerHTML = `
                    <div class="detection-result">
                        <span class="source-badge source-${topResult.source}">${topResult.source}</span>
                        <span class="confidence">${Math.round(topResult.confidence * 100)}% confidence</span>
                    </div>
                `;
            } else {
                currentDetection.innerHTML = '<div class="detection-result">No analysis available</div>';
            }
            
            modal.classList.remove('hidden');
        }

        function closeCorrectionModal() {
            const modal = document.getElementById('correction-modal');
            modal.classList.add('hidden');
            
            // Reset form
            document.getElementById('correct-source').value = '';
            document.getElementById('correction-confidence').value = '100';
            document.getElementById('correction-notes').value = '';
        }

        function submitCorrection() {
            console.log('Submit correction clicked');
            
            const correctSource = document.getElementById('correct-source').value;
            const confidence = parseInt(document.getElementById('correction-confidence').value);
            const notes = document.getElementById('correction-notes').value;
            
            console.log('Form data:', { correctSource, confidence, notes });
            
            if (!correctSource) {
                showMessage('Please select the correct AI source', 'error');
                return;
            }
            
            if (!analysisResults || !analysisResults.provenance || analysisResults.provenance.length === 0) {
                showMessage('No analysis results to correct', 'error');
                return;
            }
            
            console.log('Analysis results found:', analysisResults.provenance[0]);
            
            const detectedSource = analysisResults.provenance[0].source;
            const code = currentCode;
            
            console.log('Adding correction:', { detectedSource, correctSource, confidence });
            
            try {
                // Add correction to learning system
                const correction = learningSystem.addCorrection(code, detectedSource, correctSource, confidence, notes);
                console.log('Correction added:', correction);
                
                // Update the analysis results with adaptive probabilities
                const baseProbabilities = calculateAdvancedProbabilities(code);
                const adaptiveProbabilities = learningSystem.getAdaptiveProbabilities(code, baseProbabilities);
                console.log('Adaptive probabilities:', adaptiveProbabilities);
                
                // Update the UI with new probabilities
                updateAnalysisWithCorrection(adaptiveProbabilities, correctSource);
                
                closeCorrectionModal();
                showMessage(`Correction saved! AI detection will improve for similar code patterns.`, 'success');
            } catch (error) {
                console.error('Error submitting correction:', error);
                showMessage('Error saving correction: ' + error.message, 'error');
            }
        }

        function updateAnalysisWithCorrection(probabilities, correctSource) {
            // Update the provenance with corrected source
            if (analysisResults && analysisResults.provenance) {
                // Update the primary result
                analysisResults.provenance[0] = {
                    source: correctSource, // Use user's correction as primary
                    confidence: 1.0,
                    function: analysisResults.provenance[0].function || 'main',
                    trust_score: getTrustWeight(correctSource)
                };
                
                // Update the source probability analysis
                analysisResults.sourceProbabilities = probabilities;
                
                // Re-update the UI
                updateResults(analysisResults);
                
                // Show learning stats
                const stats = learningSystem.getTrainingStats();
                console.log('Learning System Stats:', stats);
            }
        }

        function setupEventListeners() {
            analyzeBtn.addEventListener('click', analyzeCode);
            clearBtn.addEventListener('click', clearEditor);
            codeEditor.addEventListener('input', () => {
                currentCode = codeEditor.value;
            });
            
            // File upload
            fileUpload.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.ae,.aeth,.rs,.py,.ts,.js,.css,.html,.json,.md';
                input.onchange = (e) => handleFileUpload(e.target.files[0]);
                input.click();
            });

            fileUpload.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileUpload.classList.add('dragover');
            });

            fileUpload.addEventListener('dragleave', () => {
                fileUpload.classList.remove('dragover');
            });

            fileUpload.addEventListener('drop', (e) => {
                e.preventDefault();
                fileUpload.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) handleFileUpload(file);
            });

            // Policy controls
            minTrust.addEventListener('input', (e) => {
                minTrustValue.textContent = e.target.value;
            });

            // Tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                });
            });
        }

        async function checkServerHealth() {
            if (!API_BASE) {
                // Offline mode - opened as file
                serverOnline = false;
                statusIndicator.classList.remove('online');
                statusText.textContent = 'Offline Mode';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    const health = await response.json();
                    serverOnline = true;
                    statusIndicator.classList.add('online');
                    statusText.textContent = `Online (${health.version || 'v0.1.0'})`;
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                serverOnline = false;
                statusIndicator.classList.remove('online');
                statusText.textContent = 'Offline';
                showMessage('Aether server is offline. Some features may not work.', 'error');
            }
        }

        async function analyzeCode() {
            if (!currentCode.trim()) {
                showMessage('Please enter some code to analyze.', 'error');
                return;
            }

            if (!API_BASE) {
                // Offline mode - provide mock analysis
                analyzeBtn.disabled = true;
                analyzeBtn.innerHTML = '<div class="spinner"></div> Analyzing...';
                
                setTimeout(() => {

        function createPieChart(probabilities) {

            let currentAngle = -90; // Start from top
            let paths = [];
            
            Object.entries(probabilities).forEach(([source, probability]) => {
                const angle = probability * 360;
                const endAngle = currentAngle + angle;
                
                const x1 = center + radius * Math.cos(currentAngle * Math.PI / 180);
                const y1 = center + radius * Math.sin(currentAngle * Math.PI / 180);
                const x2 = center + radius * Math.cos(endAngle * Math.PI / 180);
                const y2 = center + radius * Math.sin(endAngle * Math.PI / 180);
                
                const largeArcFlag = angle > 180 ? 1 : 0;
                
                const path = `
                    M ${center} ${center}
                    L ${x1} ${y1}
                    A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}
                    Z
                `;
                
                paths.push(`
                    <path d="${path}" fill="${getSourceColor(source)}" stroke="#21262d" stroke-width="2" opacity="0.9">
                        <title>${source}: ${(probability * 100).toFixed(1)}%</title>
                    </path>
                `);
                
                currentAngle = endAngle;
            });
            
            return `
                <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform: rotate(-90deg);">
                    ${paths.join('')}
                    <circle cx="${center}" cy="${center}" r="${radius - 20}" fill="#0d1117" stroke="#21262d" stroke-width="2"/>
                </svg>

            // Parse @prov tags from code
            const provMatches = code.match(/@prov\(\s*source:\s*"([^"]+)"\s*,\s*confidence:\s*([\d.]+)\s*\)/g) || [];
            const functions = code.match(/fn\s+(\w+)\s*\([^)]*\)\s*->\s*[^{]+/g) || [];
            
            let totalTrust = 0;
            let trustCount = 0;
            const provenance = [];
            
            // Extract provenance information from @prov tags
            provMatches.forEach(match => {
                const sourceMatch = match.match(/source:\s*"([^"]+)"/);
                const confMatch = match.match(/confidence:\s*([\d.]+)/);
                
                if (sourceMatch && confMatch) {
                    const source = sourceMatch[1];
                    const confidence = parseFloat(confMatch[1]);
                    const trustWeight = getTrustWeight(source);
                    const weightedScore = confidence * trustWeight;
                    
                    totalTrust += weightedScore;
                    trustCount++;
                    
                    provenance.push({
                        source: source,
                        confidence: confidence,
                        function: functions[provenance.length] || 'unknown',
                        trust_score: weightedScore
                    });
                }
            });
            
            // If no @prov tags, detect AI patterns in the code
            if (provenance.length === 0) {
                const detectedSource = detectAISource(code);
                const confidence = detectedSource === 'user' ? 1.0 : 0.75;
                const trustWeight = getTrustWeight(detectedSource);
                const weightedScore = confidence * trustWeight;
                
                totalTrust += weightedScore;
                trustCount++;
                
                provenance.push({
                    source: detectedSource,
                    confidence: confidence,
                    function: functions[0] || 'main',
                    trust_score: weightedScore
                });
            }
            
            const finalScore = trustCount > 0 ? totalTrust / trustCount : 0.85;
            
            return {
                trust_score: finalScore,
                provenance: provenance,
                functions: functions.map((func, i) => {
                    const prov = provenance[i] || { source: 'user', confidence: 1.0 };

                    if (lowerCode.includes('gpt') || lowerCode.includes('openai')) return 'ai';
                    if (lowerCode.includes('cursor') || lowerCode.includes('vscode')) return 'cursor';
                    if (lowerCode.includes('grok') || lowerCode.includes('x.ai')) return 'grok';
                    return 'ai';  // Generic AI

// AI Learning System
class AILearningSystem {
    constructor() {
        this.trainingData = this.loadTrainingData();
        this.patternWeights = this.loadPatternWeights();
    }

    loadTrainingData() {
        const saved = localStorage.getItem('aether-training-data');
        return saved ? JSON.parse(saved) : [];
    }

    loadPatternWeights() {
        const saved = localStorage.getItem('aether-pattern-weights');
        return saved ? JSON.parse(saved) : {
            cursor: {},
            claude: {},
            grok: {},
            ai: {},
            user: {}
        };
    }

    saveTrainingData() {
        localStorage.setItem('aether-training-data', JSON.stringify(this.trainingData));
    }

    savePatternWeights() {
        localStorage.setItem('aether-pattern-weights', JSON.stringify(this.patternWeights));
    }

    addCorrection(code, detectedSource, correctSource, confidence, notes) {
        const correction = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            code: code,
            detectedSource: detectedSource,
            correctSource: correctSource,
            confidence: confidence,
            notes: notes,
            patterns: this.extractPatterns(code)
        };

        this.trainingData.push(correction);
        this.updatePatternWeights(correction);
        this.saveTrainingData();
        this.savePatternWeights();

        return correction;
    }

    extractPatterns(code) {
        const patterns = {};
        
        // Extract all patterns from our detection system
        Object.values(cursorPatterns).forEach(category => {
            category.forEach(({ pattern, description }) => {
                if (pattern.test(code)) {
                    patterns[description] = { source: 'cursor', matched: true };
                }
            });
        });

        Object.values(grokPatterns).forEach(category => {
            category.forEach(({ pattern, description }) => {
                if (pattern.test(code)) {
                    patterns[description] = { source: 'grok', matched: true };
                }
            });
        });

        Object.values(claudePatterns).forEach(category => {
            category.forEach(({ pattern, description }) => {
                if (pattern.test(code)) {
                    patterns[description] = { source: 'claude', matched: true };
                }
            });
        });

        return patterns;
    }

    updatePatternWeights(correction) {
        const { patterns, correctSource, confidence } = correction;
        const confidenceFactor = confidence / 100;

        Object.entries(patterns).forEach(([patternDescription, patternInfo]) => {
            const patternKey = patternDescription;
            
            if (!this.patternWeights[correctSource][patternKey]) {
                this.patternWeights[correctSource][patternKey] = {
                    weight: 0.5,
                    corrections: 0,
                    confidence: 0
                };
            }

            // Increase weight for correct patterns
            if (patternInfo.source === correctSource) {
                this.patternWeights[correctSource][patternKey].weight += 0.1 * confidenceFactor;
                this.patternWeights[correctSource][patternKey].confidence += 0.1 * confidenceFactor;
            }
            // Decrease weight for incorrect patterns
            else {
                this.patternWeights[correctSource][patternKey].weight -= 0.05 * confidenceFactor;
                
                // Add weight to the correct source for this pattern
                if (!this.patternWeights[patternInfo.source][patternKey]) {
                    this.patternWeights[patternInfo.source][patternKey] = {
                        weight: 0.3,
                        corrections: 0,
                        confidence: 0
                    };
                }
                this.patternWeights[patternInfo.source][patternKey].weight += 0.05 * confidenceFactor;
            }

            this.patternWeights[correctSource][patternKey].corrections++;
        });
    }

    getAdaptiveProbabilities(code, baseProbabilities) {
        const patterns = this.extractPatterns(code);
        const adjustedProbabilities = { ...baseProbabilities };

        Object.entries(patterns).forEach(([patternDescription, patternInfo]) => {
            Object.keys(this.patternWeights).forEach(source => {
                const weightData = this.patternWeights[source][patternDescription];
                if (weightData && weightData.corrections > 0) {
                    const adjustment = (weightData.weight - 0.5) * 0.2; // Scale adjustment
                    adjustedProbabilities[source] += adjustment;
                }
            });
        });

        // Normalize probabilities
        const total = Object.values(adjustedProbabilities).reduce((sum, prob) => sum + prob, 0);
        Object.keys(adjustedProbabilities).forEach(source => {
            adjustedProbabilities[source] = adjustedProbabilities[source] / total;
        });

        return adjustedProbabilities;
    }

    getTrainingStats() {
        const stats = {
            totalCorrections: this.trainingData.length,
            accuracyBySource: {},
            patternsLearned: 0,
            confidence: 0
        };

        this.trainingData.forEach(correction => {
            const source = correction.correctSource;
            if (!stats.accuracyBySource[source]) {
                stats.accuracyBySource[source] = { correct: 0, total: 0 };
            }
            stats.accuracyBySource[source].total++;
            if (correction.correctSource === correction.detectedSource) {
                stats.accuracyBySource[source].correct++;
            }
        });

        // Count learned patterns
        Object.values(this.patternWeights).forEach(sourceWeights => {
            stats.patternsLearned += Object.values(sourceWeights).filter(w => w.corrections > 0).length;
        });

        return stats;
    }
}

        function showMessage(message, type) {
            const existing = document.querySelector('.error-message, .success-message');
            if (existing) existing.remove();
            
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error-message' : 'success-message';
            div.textContent = message;
            
            const container = document.querySelector('.container');
            container.insertBefore(div, container.firstChild);
            
            setTimeout(() => div.remove(), 5000);
        }
