<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether UI - Trust Analysis for AI-Generated Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
            font-size: 16px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            padding: 20px 0;
            border-bottom: 1px solid #21262d;
            background-color: #161b22;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #58a6ff;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            background-color: #161b22;
            border: 1px solid #30363d;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #f85149;
        }

        .status-indicator.online {
            background-color: #3fb950;
        }

        main {
            padding: 40px 0;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
            margin-bottom: 40px;
        }

        .editor-panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }

        .editor-header {
            padding: 16px;
            background-color: #21262d;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-tabs {
            display: flex;
            gap: 8px;
        }

        .tab {
            padding: 6px 12px;
            border-radius: 6px;
            background-color: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 14px;
        }

        .tab.active {
            background-color: #1f6feb;
            color: white;
        }

        .editor-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #21262d;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #30363d;
        }

        .btn.primary {
            background-color: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }

        .btn.primary:hover {
            background-color: #2c7fdb;
        }

        .code-editor {
            padding: 16px;
            min-height: 400px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            background-color: #0d1117;
            border: none;
            outline: none;
            resize: vertical;
            color: #c9d1d9;
            width: 100%;
        }

        .analysis-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .trust-score-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .trust-score {
            font-size: 3rem;
            font-weight: 600;
            margin: 16px 0;
        }

        .trust-score.high {
            color: #3fb950;
        }

        .trust-score.medium {
            color: #d29922;
        }

        .trust-score.low {
            color: #f85149;
        }

        .trust-label {
            font-size: 0.875rem;
            color: #8b949e;
            margin-bottom: 8px;
        }

        .trust-breakdown {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #30363d;
        }

        .trust-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .trust-bar {
            height: 4px;
            background-color: #30363d;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }

        .trust-fill {
            height: 100%;
            background-color: #1f6feb;
            transition: width 0.3s ease;
        }

        .provenance-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }

        .provenance-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .provenance-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background-color: #0d1117;
            border-radius: 6px;
        }

        .provenance-source {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .source.user {
            background-color: #3fb950;
            color: white;
        }

        .source.claude {
            background-color: #1f6feb;
            color: white;
        }

        .source.cursor {
            background-color: #79c0ff;
            color: #0d1117;
        }

        .source.grok {
            background-color: #d29922;
            color: white;
        }

        .source.ai {
            background-color: #8b949e;
            color: white;
        }

        .provenance-confidence {
            margin-left: auto;
            font-size: 0.875rem;
            color: #8b949e;
        }

        .policy-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }

        .policy-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.875rem;
            color: #8b949e;
        }

        .form-input {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            color: #c9d1d9;
            font-size: 14px;
        }

        .form-select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            color: #c9d1d9;
            font-size: 14px;
        }

        .results-section {
            margin-top: 40px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .result-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }

        .file-upload {
            border: 2px dashed #30363d;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .file-upload:hover {
            border-color: #1f6feb;
        }

        .file-upload.dragover {
            border-color: #1f6feb;
            background-color: #0d4f8c;
        }

        .error-message {
            background-color: #2d1a1a;
            border: 1px solid #f85149;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            color: #ff7b72;
        }

        .success-message {
            background-color: #1a2d1a;
            border: 1px solid #3fb950;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            color: #7ee83f;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8b949e;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #30363d;
            border-top: 2px solid #1f6feb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 1fr;
            }
            
            .analysis-panel {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 16px;
            }
            
            .workspace {
                gap: 16px;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">Aether UI</div>
                <div class="server-status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="file-upload" id="fileUpload">
                <div>
                    <p>Drop files here or click to upload</p>
                    <p>Supported file types: .ae, .aeth, .rs, .py, .ts, .js, .css, .html, .json, .md</p>
                </div>
            </div>

            <div class="workspace">
                <div class="editor-panel">
                    <div class="editor-header">
                        <div class="editor-tabs">
                            <button class="tab active" data-tab="code">Code</button>
                            <button class="tab" data-tab="analysis">Analysis</button>
                        </div>
                        <div class="editor-actions">
                            <button class="btn" id="clearBtn">Clear</button>
                            <button class="btn primary" id="analyzeBtn">Analyze</button>
                        </div>
                    </div>
                    <textarea class="code-editor" id="codeEditor" placeholder="// Enter your Aether code here or upload a file...

@prov(source: \"user\", confidence: 1.0)
fn main() -> Int {
  42
}"></textarea>
                </div>

                <div class="analysis-panel">
                    <div class="trust-score-card">
                        <div class="trust-label">Trust Score</div>
                        <div class="trust-score high" id="trustScore">1.00</div>
                        <div class="trust-label">High Trust</div>
                        <div class="trust-breakdown">
                            <div class="trust-item">
                                <span>User Code</span>
                                <span>100%</span>
                            </div>
                            <div class="trust-bar">
                                <div class="trust-fill" style="width: 100%"></div>
                            </div>
                        </div>
                    </div>

                    <div class="provenance-card">
                        <h3>Provenance</h3>
                        <div class="provenance-list" id="provenanceList">
                            <div class="provenance-item">
                                <div class="provenance-source source user">user</div>
                                <span>main() function</span>
                                <span class="provenance-confidence">100% confidence</span>
                            </div>
                        </div>
                    </div>

                    <div class="policy-card">
                        <h3>Policy Settings</h3>
                        <div class="policy-form">
                            <div class="form-group">
                                <label class="form-label">Minimum Trust</label>
                                <input type="range" class="form-input" id="minTrust" min="0" max="1" step="0.1" value="0.7">
                                <span id="minTrustValue">0.7</span>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Enforcement Mode</label>
                                <select class="form-select" id="enforcementMode">
                                    <option value="report">Report</option>
                                    <option value="enforce">Enforce</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Scoring</label>
                                <select class="form-select" id="scoringMode">
                                    <option value="weighted">Weighted</option>
                                    <option value="flat">Flat</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="results-section">
                <h2>Analysis Results</h2>
                <div class="results-grid" id="resultsGrid">
                    <!-- Results will be populated here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Configuration
        const API_BASE = window.location.protocol === 'file:'
            ? null  // Offline mode when opened as file
            : (window.location.origin === 'http://localhost:3000' 
                ? 'http://localhost:8080' 
                : `${window.location.origin}/api`);

        // State
        let currentCode = '';
        let analysisResults = null;
        let serverOnline = false;

        // DOM Elements
        const codeEditor = document.getElementById('codeEditor');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const fileUpload = document.getElementById('fileUpload');
        const trustScore = document.getElementById('trustScore');
        const provenanceList = document.getElementById('provenanceList');
        const resultsGrid = document.getElementById('resultsGrid');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const minTrust = document.getElementById('minTrust');
        const minTrustValue = document.getElementById('minTrustValue');
        const enforcementMode = document.getElementById('enforcementMode');
        const scoringMode = document.getElementById('scoringMode');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkServerHealth();
            setupEventListeners();
            loadSampleCode();
        });

        function setupEventListeners() {
            analyzeBtn.addEventListener('click', analyzeCode);
            clearBtn.addEventListener('click', clearEditor);
            codeEditor.addEventListener('input', () => {
                currentCode = codeEditor.value;
            });
            
            // File upload
            fileUpload.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.ae,.aeth,.rs,.py,.ts';
                input.onchange = (e) => handleFileUpload(e.target.files[0]);
                input.click();
            });

            fileUpload.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileUpload.classList.add('dragover');
            });

            fileUpload.addEventListener('dragleave', () => {
                fileUpload.classList.remove('dragover');
            });

            fileUpload.addEventListener('drop', (e) => {
                e.preventDefault();
                fileUpload.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) handleFileUpload(file);
            });

            // Policy controls
            minTrust.addEventListener('input', (e) => {
                minTrustValue.textContent = e.target.value;
            });

            // Tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                });
            });
        }

        async function checkServerHealth() {
            if (!API_BASE) {
                // Offline mode - opened as file
                serverOnline = false;
                statusIndicator.classList.remove('online');
                statusText.textContent = 'Offline Mode';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    const health = await response.json();
                    serverOnline = true;
                    statusIndicator.classList.add('online');
                    statusText.textContent = `Online (${health.version || 'v0.1.0'})`;
                } else {
                    throw new Error('Server not responding');
                }
            } catch (error) {
                serverOnline = false;
                statusIndicator.classList.remove('online');
                statusText.textContent = 'Offline';
                showMessage('Aether server is offline. Some features may not work.', 'error');
            }
        }

        async function analyzeCode() {
            if (!currentCode.trim()) {
                showMessage('Please enter some code to analyze.', 'error');
                return;
            }

            if (!API_BASE) {
                // Offline mode - provide mock analysis
                analyzeBtn.disabled = true;
                analyzeBtn.innerHTML = '<div class="spinner"></div> Analyzing...';
                
                setTimeout(() => {
                    const mockResults = generateMockAnalysis(currentCode);
                    analysisResults = mockResults;
                    updateUI(mockResults);
                    showMessage('Analysis completed (offline mode)', 'success');
                    analyzeBtn.disabled = false;
                    analyzeBtn.textContent = 'Analyze';
                }, 1500);
                return;
            }

            if (!serverOnline) {
                showMessage('Aether server is offline. Cannot analyze code.', 'error');
                return;
            }

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="spinner"></div> Analyzing...';

            try {
                const response = await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code: currentCode,
                        options: {
                            scoring: scoringMode.value,
                            include_details: true,
                            min_trust: parseFloat(minTrust.value),
                            mode: enforcementMode.value
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`Analysis failed: ${response.statusText}`);
                }

                const results = await response.json();
                analysisResults = results;
                updateUI(results);
                showMessage('Analysis completed successfully!', 'success');
                
            } catch (error) {
                showMessage(`Analysis failed: ${error.message}`, 'error');
                console.error('Analysis error:', error);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = 'Analyze';
            }
        }

        function updateUI(results) {
            // Update trust score
            const score = results.trust_score || 0.0;
            trustScore.textContent = score.toFixed(2);
            trustScore.className = 'trust-score';
            
            if (score >= 0.8) {
                trustScore.classList.add('high');
                trustScore.nextElementSibling.textContent = 'High Trust';
            } else if (score >= 0.6) {
                trustScore.classList.add('medium');
                trustScore.nextElementSibling.textContent = 'Medium Trust';
            } else {
                trustScore.classList.add('low');
                trustScore.nextElementSibling.textContent = 'Low Trust';
            }

            // Update provenance
            updateProvenance(results.provenance || []);

            // Update results
            updateResults(results);
        }

        function updateProvenance(provenance) {
            provenanceList.innerHTML = '';
            
            provenance.forEach(item => {
                const div = document.createElement('div');
                div.className = 'provenance-item';
                
                const source = document.createElement('div');
                source.className = `provenance-source source ${item.source}`;
                source.textContent = item.source;
                
                const name = document.createElement('span');
                name.textContent = item.function || 'unknown';
                
                const confidence = document.createElement('span');
                confidence.className = 'provenance-confidence';
                confidence.textContent = `${Math.round(item.confidence * 100)}% confidence`;
                
                div.appendChild(source);
                div.appendChild(name);
                div.appendChild(confidence);
                provenanceList.appendChild(div);
            });
        }

        function updateResults(results) {
            resultsGrid.innerHTML = '';
            
            // Add function analysis cards
            if (results.functions && results.functions.length > 0) {
                results.functions.forEach(func => {
                    const card = createResultCard(func.name, func.trust_score, func.source);
                    resultsGrid.appendChild(card);
                });
            }
            
            // Add provenance breakdown cards
            if (results.provenance && results.provenance.length > 0) {
                results.provenance.forEach(prov => {
                    const card = createProvenanceCard(prov.function || 'main', prov.trust_score, prov.source, prov.confidence);
                    resultsGrid.appendChild(card);
                });
            }
            
            // Add code statistics for Python/Flask code
            if (currentCode.includes('def ') || currentCode.includes('import ')) {
                const statsCard = createCodeStatsCard(currentCode);
                resultsGrid.appendChild(statsCard);
            }
            
            // Add error cards if any
            if (results.errors && results.errors.length > 0) {
                const card = createErrorCard(results.errors);
                resultsGrid.appendChild(card);
            }
            
            // Add analysis summary
            const summaryCard = createAnalysisSummaryCard(results);
            resultsGrid.appendChild(summaryCard);
        }

        function createResultCard(name, score, source) {
            const card = document.createElement('div');
            card.className = 'result-card';
            
            const scoreClass = score >= 0.8 ? 'high' : score >= 0.6 ? 'medium' : 'low';
            
            card.innerHTML = `
                <h4>${name}</h4>
                <div class="trust-score ${scoreClass}">${score.toFixed(2)}</div>
                <div class="trust-label">Source: ${source}</div>
                <div class="trust-bar">
                    <div class="trust-fill" style="width: ${score * 100}%"></div>
                </div>
            `;
            
            return card;
        }

        function createProvenanceCard(functionName, score, source, confidence) {
            const card = document.createElement('div');
            card.className = 'result-card';
            
            const scoreClass = score >= 0.8 ? 'high' : score >= 0.6 ? 'medium' : 'low';
            
            card.innerHTML = `
                <h4>${functionName}</h4>
                <div class="trust-score ${scoreClass}">${score.toFixed(2)}</div>
                <div class="trust-label">Source: ${source}</div>
                <div class="trust-label">Confidence: ${Math.round(confidence * 100)}%</div>
                <div class="trust-bar">
                    <div class="trust-fill" style="width: ${score * 100}%"></div>
                </div>
            `;
            
            return card;
        }
        
        function createCodeStatsCard(code) {
            const card = document.createElement('div');
            card.className = 'result-card';
            
            const lines = code.split('\n').length;
            const functions = (code.match(/def\s+\w+/g) || []).length;
            const imports = (code.match(/import\s+\w+/g) || []).length;
            const classes = (code.match(/class\s+\w+/g) || []).length;
            const comments = (code.match(/^#.*$/gm) || []).length;
            
            card.innerHTML = `
                <h4>Code Statistics</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.875rem;">
                    <div><strong>Lines:</strong> ${lines}</div>
                    <div><strong>Functions:</strong> ${functions}</div>
                    <div><strong>Imports:</strong> ${imports}</div>
                    <div><strong>Classes:</strong> ${classes}</div>
                    <div><strong>Comments:</strong> ${comments}</div>
                    <div><strong>Language:</strong> Python</div>
                </div>
            `;
            
            return card;
        }
        
        function createAnalysisSummaryCard(results) {
            const card = document.createElement('div');
            card.className = 'result-card';
            
            const totalFunctions = results.functions ? results.functions.length : 0;
            const avgTrust = results.trust_score || 0.0;
            const primarySource = results.provenance && results.provenance.length > 0 ? results.provenance[0].source : 'unknown';
            
            // Calculate AI source probabilities
            const sourceProbabilities = calculateSourceProbabilities(currentCode);
            
            card.innerHTML = `
                <h4>Analysis Summary</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.875rem;">
                    <div><strong>Functions:</strong> ${totalFunctions}</div>
                    <div><strong>Avg Trust:</strong> ${avgTrust.toFixed(2)}</div>
                    <div><strong>Primary Source:</strong> ${primarySource}</div>
                    <div><strong>Analysis Mode:</strong> Offline</div>
                </div>
                
                <div style="margin-top: 16px;">
                    <h5 style="margin-bottom: 12px; font-size: 0.875rem;">Source Probability Analysis</h5>
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <div style="position: relative; width: 120px; height: 120px;">
                            ${createPieChart(sourceProbabilities)}
                        </div>
                        <div style="flex: 1;">
                            ${Object.entries(sourceProbabilities).map(([source, prob]) => `
                                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.8rem;">
                                    <div style="width: 12px; height: 12px; border-radius: 50%; background-color: ${getSourceColor(source)};"></div>
                                    <span style="flex: 1;">${source.charAt(0).toUpperCase() + source.slice(1)}</span>
                                    <span style="font-weight: bold;">${(prob * 100).toFixed(1)}%</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 12px; padding: 8px; background-color: #0d4f8c; border-radius: 4px; font-size: 0.875rem;">
                    <strong>AI Detection:</strong> ${getDetectionExplanation(sourceProbabilities)}
                </div>
            `;
            
            return card;
        }
        
        function calculateSourceProbabilities(code) {
            const probabilities = {
                user: 0.1,
                claude: 0.25,
                cursor: 0.15,
                grok: 0.10,
                ai: 0.40
            };
            
            const lowerCode = code.toLowerCase();
            
            // Claude indicators
            if (lowerCode.includes('claude') || lowerCode.includes('anthropic')) {
                probabilities.claude += 0.20;
                probabilities.user -= 0.10;
                probabilities.ai -= 0.10;
            }
            
            // Cursor AI assistant patterns (my specific code signatures)
            const cursorPatterns = [
                /\/\* Core Styles for [\w\s]+ \*\//,  // My CSS comment style
                /:root\s*\{[^}]*--primary-color:/,  // CSS variable patterns I use
                /class\s+\w+Controller\s*\{/,  // My class naming convention
                /constructor\(\)\s*\{\s*this\./,  // My constructor pattern
                /this\.\w+\s*=\s*this\.load\w+\(\)/,  // My data loading pattern
                /this\.init\(\)/,  // My initialization pattern
                /setupEventListeners\(\)/,  // My method naming
                /document\.querySelectorAll\('\.\w+-btn'\)/,  // My selector patterns
                /e\.currentTarget\.dataset\.\w+/,  // My event handling
                /switch\s*\(\w+\)\s*\{\s*case\s*'/,  // My switch statement style
                /localStorage\.getItem\('\w+-\w+'\)/,  // My storage pattern
                /JSON\.parse\(saved\)/,  // My JSON handling
                /const\s+\w+\s*=\s*saved\s*\?/,  // My conditional pattern
                /template\s+literal/,  // My template literal usage
                /\.map\(\w+\s*=>\s*`\$\{/,  // My template mapping
                /Math\.max\(0,\s*Math\.min\(/,  // My Math pattern
                /new Date\(\)\.toISOString\(\)/,  // My date handling
                /requestNotificationPermission\(\)/,  // My notification pattern
                /showNotification\('\w+',/,  // My notification method
                /exportAllData\(\)/,  // My export method naming
                /clearAllData\(\)/,  // My clear method naming
                /handleKeyboardShortcuts\(\)/,  // My method naming
                /visibilitychange/,  // My visibility API usage
                /beforeunload/,  // My beforeunload usage
                /DOMContentLoaded/,  // My DOM ready usage
            ];
            
            let cursorScore = 0;
            cursorPatterns.forEach(pattern => {
                if (pattern.test(code)) cursorScore++;
            });
            
            // Strong Cursor identification
            if (cursorScore >= 5) {
                probabilities.cursor += 0.50;
                probabilities.user -= 0.20;
                probabilities.ai -= 0.20;
                probabilities.grok -= 0.05;
                probabilities.claude -= 0.05;
            } else if (cursorScore >= 3) {
                probabilities.cursor += 0.35;
                probabilities.user -= 0.15;
                probabilities.ai -= 0.15;
                probabilities.grok -= 0.03;
                probabilities.claude -= 0.02;
            }
            
            // Cursor indicators
            if (lowerCode.includes('cursor') || lowerCode.includes('vscode')) {
                probabilities.cursor += 0.20;
                probabilities.user -= 0.10;
                probabilities.ai -= 0.10;
            }
            
            // Grok indicators
            if (lowerCode.includes('grok') || lowerCode.includes('x.ai') || 
                lowerCode.includes('elon') || lowerCode.includes('musk') ||
                lowerCode.includes('ass') || lowerCode.includes('blaster') ||
                lowerCode.includes('meme') || lowerCode.includes('3000')) {
                probabilities.grok += 0.35;
                probabilities.user -= 0.15;
                probabilities.ai -= 0.20;
            }
            
            // Grok-specific humor patterns (only when actually present)
            const grokPatterns = [
                /💰|💦|🔫|💣|🚀/,  // Emoji patterns (Grok loves emojis)
                /(?:elon|musk|tesla|spacex)/i,  // Elon-related content
                /(?:ass|butt|booty)/i,  // Grok's signature humor
                /(?:blaster|shot|gun)/i,  // Aggressive/violent themes
                /(?:meme|dank|funny)/i,  // Meme culture
                /(?:3000|9000|420)/i,  // Number patterns
                /print\(["'][^"']*💰[^"']*["']/,  // Emoji in print statements
                /print\(["'][^"']*ASS[^"']*["']/i,  // ASS in print statements
            ];
            
            let grokScore = 0;
            grokPatterns.forEach(pattern => {
                if (pattern.test(code)) grokScore++;
            });
            
            // Only apply Grok boost if there are actual Grok indicators
            if (grokScore >= 2) {
                probabilities.grok += 0.30;
                probabilities.user -= 0.10;
                probabilities.ai -= 0.15;
                probabilities.claude -= 0.03;
                probabilities.cursor -= 0.02;
            }
            
            // Human code patterns (strong indicators)
            const humanCodePatterns = [
                /constructor\(\)\s*\{/,  // Class constructors
                /addEventListener\(/,  // Event listeners
                /localStorage\./,  // LocalStorage usage
                /document\.getElementById\(/,  // DOM manipulation
                /querySelector\(/,  // Modern DOM queries
                /classList\./,  // ClassList API
                /\.forEach\(/,  // Array methods
                /\.map\(/,  // Array methods
                /\.filter\(/,  // Array methods
                /\.reduce\(/,  // Array methods
                /template\s+literal/,  // Template literals
                /const\s+\w+\s*=/,  // ES6 const declarations
                /let\s+\w+\s*=/,  // ES6 let declarations
                /=>\s*{/,  // Arrow functions
                /\.\.\./,  // Spread operator
                /async\s+function/,  // Async functions
                /await\s+\w+/,  // Await expressions
            ];
            
            let humanCodeScore = 0;
            humanCodePatterns.forEach(pattern => {
                if (pattern.test(code)) humanCodeScore++;
            });
            
            // Strong boost for human code patterns
            if (humanCodeScore >= 5) {
                probabilities.user += 0.40;
                probabilities.ai -= 0.20;
                probabilities.grok -= 0.10;
                probabilities.claude -= 0.05;
                probabilities.cursor -= 0.05;
            } else if (humanCodeScore >= 3) {
                probabilities.user += 0.25;
                probabilities.ai -= 0.15;
                probabilities.grok -= 0.05;
                probabilities.claude -= 0.03;
                probabilities.cursor -= 0.02;
            }
            
            // Check for clean, structured code (human indicator)
            const cleanCodePatterns = [
                /^\s*\/\/.*$/gm,  // Single-line comments
                /^\s*\/\*[\s\S]*?\*\/\s*$/gm,  // Multi-line comments
                /^\s*$/gm,  // Empty lines (formatting)
                /function\s+\w+\s*\([^)]*\)\s*{/,  // Function declarations
                /if\s*\([^)]*\)\s*{/,  // If statements
                /for\s*\([^)]*\)\s*{/,  // For loops
                /while\s*\([^)]*\)\s*{/,  // While loops
                /try\s*{/,  // Try blocks
                /catch\s*\([^)]*\)\s*{/,  // Catch blocks
            ];
            
            let cleanCodeScore = 0;
            cleanCodePatterns.forEach(pattern => {
                if (pattern.test(code)) cleanCodeScore++;
            });
            
            if (cleanCodeScore >= 4) {
                probabilities.user += 0.15;
                probabilities.ai -= 0.10;
            }
            
            // Generic AI patterns
            const aiPatterns = [
                /#.*(?:generated|created|written|produced)/i,
                /#.*(?:example|sample|demo)/i,
                /#.*(?:here'?s|here is)/i,
                /def\s+\w+\s*\([^)]*\):\s*"""[\s\S]*?"""/,
                /print\([^)]*\)/,
                /#.*TODO|FIXME|NOTE/i
            ];
            
            let aiScore = 0;
            aiPatterns.forEach(pattern => {
                if (pattern.test(code)) aiScore++;
            });
            
            if (aiScore >= 3) {
                probabilities.ai += 0.15;
                probabilities.user -= 0.05;
                probabilities.claude -= 0.05;
                probabilities.cursor -= 0.02;
                probabilities.grok -= 0.03;
            }
            
            // Flask/web app patterns (strong AI indicator)
            if (code.includes('Flask') || code.includes('app.route')) {
                probabilities.ai += 0.10;
                probabilities.claude += 0.05;
                probabilities.user -= 0.15;
            }
            
            // Human indicators
            const humanPatterns = [
                /#.*(?:fix|bug|issue|problem)/i,
                /#.*(?:todo|hack|temporary)/i,
                /#.*(?:wip|work in progress)/i,
                /print\(.*debug.*\)/i,
                /#.*(?:test|testing)/i
            ];
            
            let humanScore = 0;
            humanPatterns.forEach(pattern => {
                if (pattern.test(code)) humanScore++;
            });
            
            if (humanScore >= 2) {
                probabilities.user += 0.20;
                probabilities.ai -= 0.10;
                probabilities.claude -= 0.05;
                probabilities.cursor -= 0.03;
                probabilities.grok -= 0.02;
            }
            
            // Normalize probabilities
            const total = Object.values(probabilities).reduce((sum, prob) => sum + prob, 0);
            Object.keys(probabilities).forEach(source => {
                probabilities[source] = probabilities[source] / total;
            });
            
            return probabilities;
        }
        
        function getSourceColor(source) {
            const colors = {
                user: '#58a6ff',
                claude: '#f85149',
                cursor: '#fb8500',
                grok: '#7c3aed',
                ai: '#8b5cf6'
            };
            return colors[source] || '#8b949e';
        }
        
        function createPieChart(probabilities) {
            const size = 120;
            const center = size / 2;
            const radius = size / 2 - 10;
            
            let currentAngle = -90; // Start from top
            let paths = [];
            
            Object.entries(probabilities).forEach(([source, probability]) => {
                const angle = probability * 360;
                const endAngle = currentAngle + angle;
                
                const x1 = center + radius * Math.cos(currentAngle * Math.PI / 180);
                const y1 = center + radius * Math.sin(currentAngle * Math.PI / 180);
                const x2 = center + radius * Math.cos(endAngle * Math.PI / 180);
                const y2 = center + radius * Math.sin(endAngle * Math.PI / 180);
                
                const largeArcFlag = angle > 180 ? 1 : 0;
                
                const path = `
                    M ${center} ${center}
                    L ${x1} ${y1}
                    A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}
                    Z
                `;
                
                paths.push(`
                    <path d="${path}" fill="${getSourceColor(source)}" stroke="#21262d" stroke-width="2" opacity="0.9">
                        <title>${source}: ${(probability * 100).toFixed(1)}%</title>
                    </path>
                `);
                
                currentAngle = endAngle;
            });
            
            return `
                <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform: rotate(-90deg);">
                    ${paths.join('')}
                    <circle cx="${center}" cy="${center}" r="${radius - 20}" fill="#0d1117" stroke="#21262d" stroke-width="2"/>
                </svg>
            `;
        }
        
        function getDetectionExplanation(probabilities) {
            const topSource = Object.entries(probabilities).reduce((max, [source, prob]) => 
                prob > max.prob ? {source, prob} : max, {source: 'unknown', prob: 0});
            
            const humanProb = probabilities.user * 100;
            const aiProb = (probabilities.claude + probabilities.cursor + probabilities.grok + probabilities.ai) * 100;
            
            if (aiProb > 70) {
                return `High confidence AI-generated code (${aiProb.toFixed(1)}% AI vs ${humanProb.toFixed(1)}% human). Most likely ${topSource.source} (${(topSource.prob * 100).toFixed(1)}%).`;
            } else if (aiProb > 50) {
                return `Likely AI-generated code (${aiProb.toFixed(1)}% AI vs ${humanProb.toFixed(1)}% human). Pattern analysis suggests ${topSource.source}.`;
            } else if (aiProb > 30) {
                return `Mixed human/AI authorship (${aiProb.toFixed(1)}% AI vs ${humanProb.toFixed(1)}% human). Contains elements from multiple sources.`;
            } else {
                return `Likely human-written code (${humanProb.toFixed(1)}% human vs ${aiProb.toFixed(1)}% AI). Shows minimal AI patterns.`;
            }
        }
        
        function createErrorCard(errors) {
            const card = document.createElement('div');
            card.className = 'result-card';
            card.style.borderColor = '#f85149';
            
            card.innerHTML = `
                <h4 style="color: #f85149;">Errors</h4>
                ${errors.map(error => `<div style="color: #ff7b72; font-size: 0.875rem;">${error}</div>`).join('')}
            `;
            
            return card;
        }

        function handleFileUpload(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentCode = e.target.result;
                codeEditor.value = currentCode;
                showMessage(`Loaded ${file.name}`, 'success');
            };
            reader.onerror = () => {
                showMessage('Failed to read file', 'error');
            };
            reader.readAsText(file);
        }

        function clearEditor() {
            currentCode = '';
            codeEditor.value = '';
            analysisResults = null;
            resetUI();
            showMessage('Editor cleared', 'success');
        }

        function resetUI() {
            trustScore.textContent = '1.00';
            trustScore.className = 'trust-score high';
            trustScore.nextElementSibling.textContent = 'High Trust';
            provenanceList.innerHTML = '';
            resultsGrid.innerHTML = '';
        }

        function loadSampleCode() {
            currentCode = `@prov(source: "user", confidence: 1.0)
fn main() -> Int {
  42
}

@prov(source: "claude", confidence: 0.85)
fn calculate_total(items: List<Item>) -> Float {
  // AI-generated implementation
  let total = 0.0;
  for item in items {
    total += item.price;
  }
  total
}

@prov(source: "cursor", confidence: 0.75)
fn process_user_data(data: UserData) -> ProcessedData {
  // Cursor-generated implementation
  ProcessedData {
    name: data.name,
    score: calculate_score(data)
  }
}`;
            codeEditor.value = currentCode;
        }

        function generateMockAnalysis(code) {
            // Parse @prov tags from code
            const provMatches = code.match(/@prov\(\s*source:\s*"([^"]+)"\s*,\s*confidence:\s*([\d.]+)\s*\)/g) || [];
            const functions = code.match(/fn\s+(\w+)\s*\([^)]*\)\s*->\s*[^{]+/g) || [];
            
            let totalTrust = 0;
            let trustCount = 0;
            const provenance = [];
            
            // Extract provenance information from @prov tags
            provMatches.forEach(match => {
                const sourceMatch = match.match(/source:\s*"([^"]+)"/);
                const confMatch = match.match(/confidence:\s*([\d.]+)/);
                
                if (sourceMatch && confMatch) {
                    const source = sourceMatch[1];
                    const confidence = parseFloat(confMatch[1]);
                    const trustWeight = getTrustWeight(source);
                    const weightedScore = confidence * trustWeight;
                    
                    totalTrust += weightedScore;
                    trustCount++;
                    
                    provenance.push({
                        source: source,
                        confidence: confidence,
                        function: functions[provenance.length] || 'unknown',
                        trust_score: weightedScore
                    });
                }
            });
            
            // If no @prov tags, detect AI patterns in the code
            if (provenance.length === 0) {
                const detectedSource = detectAISource(code);
                const confidence = detectedSource === 'user' ? 1.0 : 0.75;
                const trustWeight = getTrustWeight(detectedSource);
                const weightedScore = confidence * trustWeight;
                
                totalTrust += weightedScore;
                trustCount++;
                
                provenance.push({
                    source: detectedSource,
                    confidence: confidence,
                    function: functions[0] || 'main',
                    trust_score: weightedScore
                });
            }
            
            const finalScore = trustCount > 0 ? totalTrust / trustCount : 0.85;
            
            return {
                trust_score: finalScore,
                provenance: provenance,
                functions: functions.map((func, i) => {
                    const prov = provenance[i] || { source: 'user', confidence: 1.0 };
                    return {
                        name: func.match(/fn\s+(\w+)/)?.[1] || 'unknown',
                        trust_score: prov.trust_score || 0.85,
                        source: prov.source || 'user'
                    };
                }),
                errors: []
            };
        }
        
        function detectAISource(code) {
            // Detect patterns that indicate AI-generated code
            const lowerCode = code.toLowerCase();
            
            // Python-specific patterns
            if (code.includes('def ') || code.includes('import ') || code.includes('class ')) {
                // Check for AI patterns in Python code
                const aiPatterns = [
                    /#.*(?:generated|created|written|produced)/i,
                    /#.*(?:ai|claude|gpt|assistant|model)/i,
                    /def\s+\w+\s*\([^)]*\):\s*"""[\s\S]*?"""/,  // Docstrings (AI loves docstrings)
                    /#.*TODO|FIXME|NOTE/i,  // AI often adds these comments
                    /print\(.*\)/,  // Debug prints (AI common)
                    /#.*(?:example|sample|demo)/i,  // AI often labels examples
                    /#.*(?:here'?s|here is)/i,  // AI conversational patterns
                ];
                
                // Check for multiple AI indicators
                let aiScore = 0;
                aiPatterns.forEach(pattern => {
                    if (pattern.test(code)) aiScore++;
                });
                
                // Check for overly structured/verbose comments
                const commentLines = code.match(/^#.*$/gm) || [];
                if (commentLines.length > 5) aiScore += 2;
                
                // Check for comprehensive docstrings
                const docstringMatches = code.match(/""".*?"""/gs) || [];
                if (docstringMatches.length > 0 && docstringMatches[0].length > 200) aiScore += 2;
                
                // Check for "perfect" error handling (AI over-engineering)
                if (code.includes('try:') && code.includes('except') && code.includes('finally:')) aiScore += 1;
                
                // Check for type hints (AI loves them)
                if (code.includes(': ') && code.includes(' -> ')) aiScore += 1;
                
                if (aiScore >= 3) {
                    // Determine which AI based on patterns
                    if (lowerCode.includes('claude') || lowerCode.includes('anthropic')) return 'claude';
                    if (lowerCode.includes('gpt') || lowerCode.includes('openai')) return 'ai';
                    if (lowerCode.includes('cursor') || lowerCode.includes('vscode')) return 'cursor';
                    if (lowerCode.includes('grok') || lowerCode.includes('x.ai')) return 'grok';
                    return 'ai';  // Generic AI
                }
            }
            
            // Flask/web app patterns (often AI-generated)
            if (code.includes('Flask') || code.includes('app.route') || code.includes('render_template')) {
                const webPatterns = [
                    /#.*(?:flask|web|api|endpoint)/i,
                    /@app\.route/,
                    /def\s+\w+\s*\([^)]*\):\s*#/,
                    /jsonify/,
                    /request\.get_json/,
                    /render_template/,
                ];
                
                let webScore = 0;
                webPatterns.forEach(pattern => {
                    if (pattern.test(code)) webScore++;
                });
                
                if (webScore >= 3) return 'ai';
            }
            
            // Check for human patterns
            const humanPatterns = [
                /#.*(?:fix|bug|issue|problem)/i,  // Humans fix bugs
                /#.*(?:todo|hack|temporary)/i,    // Human todos
                /#.*(?:wip|work in progress)/i,    // Human WIP
                /print\(["'][^"']*debug[^"']*["']\)/i,  // Debug prints
                /#.*(?:test|testing)/i,           // Human testing
            ];
            
            let humanScore = 0;
            humanPatterns.forEach(pattern => {
                if (pattern.test(code)) humanScore++;
            });
            
            if (humanScore >= 2) return 'user';
            
            // Default to user for short, simple code
            if (code.length < 500) return 'user';
            
            // Default to ai for complex, well-structured code without human indicators
            return 'ai';
        }
        
        function getTrustWeight(source) {
            const weights = {
                'user': 1.0,
                'claude': 0.85,
                'cursor': 0.80,
                'grok': 0.75,
                'ai': 0.70
            };
            return weights[source] || 0.70;
        }

        function showMessage(message, type) {
            const existing = document.querySelector('.error-message, .success-message');
            if (existing) existing.remove();
            
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error-message' : 'success-message';
            div.textContent = message;
            
            const container = document.querySelector('.container');
            container.insertBefore(div, container.firstChild);
            
            setTimeout(() => div.remove(), 5000);
        }
    </script>
